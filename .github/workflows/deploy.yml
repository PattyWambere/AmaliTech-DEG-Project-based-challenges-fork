name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/kora-analytics-api

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dev-ops/DeployReady/app/package-lock.json

      - name: Install dependencies
        working-directory: dev-ops/DeployReady/app
        run: npm ci

      - name: Run Jest tests
        working-directory: dev-ops/DeployReady/app
        run: npm test

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: dev-ops/DeployReady
          file: dev-ops/DeployReady/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy new image on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            IMAGE="${{ env.IMAGE_NAME }}"
            NEW_IMAGE="${IMAGE}:${{ needs.build-and-push.outputs.image_tag }}"
            CONTAINER="kora-analytics-api"

            PREVIOUS=$(docker inspect --format='{{.Config.Image}}' $CONTAINER 2>/dev/null || echo "none")

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull "${NEW_IMAGE}"

            docker stop $CONTAINER 2>/dev/null || true
            docker rm   $CONTAINER 2>/dev/null || true

            docker run -d \
              --name $CONTAINER \
              --restart unless-stopped \
              -p 80:3000 \
              -e PORT=3000 \
              "${NEW_IMAGE}"

            sleep 15
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/health)

            if [ "$STATUS" != "200" ]; then
              echo "Health check failed — rolling back to ${PREVIOUS}"
              docker stop $CONTAINER || true
              docker rm   $CONTAINER || true
              if [ "$PREVIOUS" != "none" ]; then
                docker run -d --name $CONTAINER --restart unless-stopped \
                  -p 80:3000 -e PORT=3000 "${PREVIOUS}"
              fi
              exit 1
            fi

            echo "Deploy successful!"
            docker image prune -f
