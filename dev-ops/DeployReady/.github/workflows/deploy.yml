# .github/workflows/deploy.yml
# Full CI/CD pipeline: Test → Build → Push to GHCR → Deploy to EC2
# Triggered on every push to the main branch.

name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  # GitHub Container Registry image name (lowercase repo owner required)
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/kora-analytics-api

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — TEST
  # Run the Jest test suite. If any test fails the pipeline stops here;
  # nothing gets built or deployed.
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      # Check out the repository code so the runner can access it
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up the correct Node.js version to match the production environment
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      # Install all dependencies (including devDependencies for Jest/Supertest)
      - name: Install dependencies
        working-directory: app
        run: npm ci

      # Execute the test suite — failure here aborts the entire workflow
      - name: Run Jest tests
        working-directory: app
        run: npm test

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — BUILD & PUSH
  # Build the Docker image, tag it with the Git commit SHA for traceability,
  # and push it to GitHub Container Registry (GHCR).
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test # Only runs if the test job succeeds

    outputs:
      # Pass the image tag downstream so the deploy job knows what to pull
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      # Check out source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Log in to GitHub Container Registry using the built-in GITHUB_TOKEN
      # (no extra secret needed for GHCR in the same repo)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Enable BuildKit cache and multi-platform support via docker/setup-buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Generate image tags:
      #   - ghcr.io/<owner>/kora-analytics-api:<commit-sha>  (immutable, traceable)
      #   - ghcr.io/<owner>/kora-analytics-api:latest        (convenience alias)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      # Build the production-target image and push both tags to GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — DEPLOY
  # SSH into the EC2 instance, pull the new image, restart the container,
  # and verify the /health endpoint. Rolls back to the previous image on failure.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push # Only runs if the image was successfully pushed

    steps:
      # Check out repo (needed to access any deploy helper scripts if added later)
      - name: Checkout repository
        uses: actions/checkout@v4

      # Open an SSH connection to the EC2 instance and run the deploy commands.
      # EC2_HOST, EC2_USER, and EC2_SSH_KEY are stored as GitHub repository secrets.
      - name: Deploy new image on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # Pass the image name and SHA tag so the remote script can use them
          envs: IMAGE_NAME,GITHUB_SHA
          script: |
            set -e   # Exit immediately if any command fails

            IMAGE="${{ env.IMAGE_NAME }}"
            NEW_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            NEW_IMAGE="${IMAGE}:${NEW_TAG}"
            CONTAINER_NAME="kora-analytics-api"

            echo "==> Saving current image tag for potential rollback..."
            PREVIOUS_IMAGE=$(docker inspect --format='{{.Config.Image}}' $CONTAINER_NAME 2>/dev/null || echo "none")

            echo "==> Logging in to GitHub Container Registry..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "==> Pulling new image: ${NEW_IMAGE}"
            docker pull "${NEW_IMAGE}"

            echo "==> Stopping and removing the existing container (if any)..."
            docker stop $CONTAINER_NAME 2>/dev/null || true
            docker rm   $CONTAINER_NAME 2>/dev/null || true

            echo "==> Starting container with the new image..."
            docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              -p 80:3000 \
              -e PORT=3000 \
              "${NEW_IMAGE}"

            echo "==> Waiting 15 seconds for the container to become healthy..."
            sleep 15

            echo "==> Running health check..."
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/health)

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "!! Health check FAILED (HTTP ${HTTP_STATUS}). Rolling back to ${PREVIOUS_IMAGE}..."

              docker stop $CONTAINER_NAME 2>/dev/null || true
              docker rm   $CONTAINER_NAME 2>/dev/null || true

              if [ "$PREVIOUS_IMAGE" != "none" ]; then
                docker run -d \
                  --name $CONTAINER_NAME \
                  --restart unless-stopped \
                  -p 80:3000 \
                  -e PORT=3000 \
                  "${PREVIOUS_IMAGE}"
                echo "!! Rollback complete. Previous image is running."
              else
                echo "!! No previous image to roll back to."
              fi

              exit 1   # Mark the pipeline as failed
            fi

            echo "==> Deploy successful! /health returned HTTP 200."

            # Clean up dangling images to reclaim disk space
            docker image prune -f